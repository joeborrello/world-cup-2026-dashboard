<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Soccer ball">
  <defs>
    <clipPath id="ball"><circle cx="32" cy="32" r="30"/></clipPath>
  </defs>
  <circle cx="32" cy="32" r="30" fill="#ffffff" stroke="#111111" stroke-width="2.5"/>
  <g clip-path="url(#ball)" fill="#111111">
    <!-- central pentagon -->
    <polygon points="32,21 42.5,28.6 38.5,40.9 25.5,40.9 21.5,28.6"/>
    <!-- rim patches (clipped to the ball edge) -->
    <polygon points="32,-5 38.7,-0.2 36.1,7.7 27.9,7.7 25.3,-0.2"/>
    <polygon points="60.5,15.7 67.2,20.6 64.6,28.4 56.4,28.4 53.9,20.6"/>
    <polygon points="49.6,49.3 56.3,54.1 53.8,61.9 45.5,61.9 43.0,54.1"/>
    <polygon points="14.4,49.3 21.0,54.1 18.5,61.9 10.3,61.9 7.7,54.1"/>
    <polygon points="3.5,15.7 10.1,20.6 7.6,28.4 -0.6,28.4 -3.2,20.6"/>
  </g>
  <g clip-path="url(#ball)" stroke="#111111" stroke-width="2.2" stroke-linecap="round">
    <!-- seams from the central pentagon out to the rim patches -->
    <line x1="32" y1="21" x2="32" y2="2"/>
    <line x1="42.5" y1="28.6" x2="60.5" y2="22.7"/>
    <line x1="38.5" y1="40.9" x2="49.6" y2="56.3"/>
    <line x1="25.5" y1="40.9" x2="14.4" y2="56.3"/>
    <line x1="21.5" y1="28.6" x2="3.5" y2="22.7"/>
  </g>
</svg>
